# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e894f04b6416c7c4faa5c8036a01f8a3"
name = "counterpilot-dev"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

[[webhooks.subscriptions]]
topics = [ "orders/create", "orders/paid" ]
uri = "/counterpilot/webhooks/shopify/orders"
include_fields = [
  "id",
  "admin_graphql_api_id",
  "name",
  "created_at",
  "updated_at",
  "processed_at",
  "currency",
  "presentment_currency",
  "financial_status",
  "current_total_price",
  "current_subtotal_price",
  "current_total_discounts",
  "current_total_tax",
  "current_shipping_price_set",
  "note_attributes",
  "tags",
  "line_items.id",
  "line_items.variant_id",
  "line_items.quantity",
  "line_items.price",
]

[[webhooks.subscriptions]]
topics = [ "refunds/create" ]
uri = "/counterpilot/webhooks/shopify/refunds"
include_fields = [
  "id",
  "admin_graphql_api_id",
  "order_id",
  "created_at",
  "processed_at",
  "refund_line_items.quantity",
  "refund_line_items.subtotal_set",
  "refund_line_items.total_tax_set",
  "refund_shipping_lines",
  "order_adjustments",
  "transactions.id",
  "transactions.kind",
  "transactions.status",
  "transactions.amount",
  "transactions.currency",
  "transactions.admin_graphql_api_id",
]

[access.admin]
direct_api_mode = "online"
embedded_app_direct_api_access = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_orders,read_products,write_draft_orders"

[auth]
redirect_urls = [ "https://shopify.dev/apps/default-app-home/api/auth" ]
