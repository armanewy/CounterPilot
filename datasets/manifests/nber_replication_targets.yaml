        "paper_sample_do"
      ],
      "source_detail": "Appendix A, Table A1; paper_sample.do pre-collapse listing-level sample construction",
      "population_filters": [
        "All Best-Offer-enabled single-unit US eBay listings in the released listings table before paper restrictions"
      ],
      "formula": "count distinct anon_item_id before applying crit_1k, crit_price, crit_offr, crit_numoff_byr, crit_numoff_slr, crit_counter, crit_accept, or released-code crit_duplicate_time",
      "expected": {
        "type": "integer",
        "value": 98307281
      },
      "tolerance": {
        "type": "exact",
        "absolute": 0
      },
      "known_differences": [
        "NBER dataset page rounds this as 98 million listings.",
        "Paper text also describes over 90 million before exclusions and 88.4 million after exclusions; Table A1 is the exact published count."
      ]
    },
    {
